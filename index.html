<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>58mm Label Printer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: monospace; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        button { background: #0052cc; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        button:disabled { background: #ccc; }
        pre { background: #f0f0f0; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; white-space: pre-wrap; }
        .status { padding: 10px; margin: 10px 0; border-radius: 6px; }
        .good { background: #d4edda; color: #155724; }
        .bad { background: #f8d7da; color: #721c24; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .raw-data { background: #e8f4f8; font-size: 10px; max-height: 200px; overflow: auto; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📦 58mm Label Printer</h2>
    
    <input type="file" id="fileInput" accept=".pdf">
    <button id="extractBtn">🔍 Extract from PDF</button>
    <button id="printBtn" disabled>🖨️ Print to Bluetooth Printer</button>
    
    <div id="status"></div>
    
    <h3>📄 Extracted Data (will print this):</h3>
    <pre id="preview">No data yet...</pre>
    
    <h3>✏️ Manual Edit (changes print output):</h3>
    <label>Tracking ID / Barcode:</label>
    <input type="text" id="manualId" placeholder="SPXID...">
    <label>Sender (address/name):</label>
    <textarea id="manualSender" rows="2" placeholder="Sender info"></textarea>
    <label>Receiver (name/address):</label>
    <textarea id="manualReceiver" rows="2" placeholder="Receiver info"></textarea>
    <label>Products (one per line):</label>
    <textarea id="manualProducts" rows="4" placeholder="1x Product Name&#10;2x Another Product"></textarea>
    
    <details>
        <summary>🔧 Debug: Raw extracted text</summary>
        <pre id="rawText" class="raw-data"></pre>
    </details>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    let extractedRawText = "";
    let printData = {
        id: "",
        barcode: "",
        sender: "",
        receiver: "",
        products: []
    };

    const fileInput = document.getElementById('fileInput');
    const extractBtn = document.getElementById('extractBtn');
    const printBtn = document.getElementById('printBtn');
    const statusDiv = document.getElementById('status');
    const previewDiv = document.getElementById('preview');
    const rawTextDiv = document.getElementById('rawText');
    const manualId = document.getElementById('manualId');
    const manualSender = document.getElementById('manualSender');
    const manualReceiver = document.getElementById('manualReceiver');
    const manualProducts = document.getElementById('manualProducts');

    function showStatus(msg, isError = false) {
        statusDiv.innerHTML = `<div class="${isError ? 'bad' : 'good'}">${msg}</div>`;
    }

    function updatePreview() {
        const id = manualId.value || printData.id || 'Not set';
        const sender = manualSender.value || printData.sender || 'Not set';
        const receiver = manualReceiver.value || printData.receiver || 'Not set';
        let products = [];
        if (manualProducts.value) {
            products = manualProducts.value.split('\n').filter(p => p.trim());
        } else if (printData.products && printData.products.length) {
            products = printData.products;
        } else {
            products = ['No products'];
        }
        
        previewDiv.innerHTML = `
╔════════════════════════════════════════════╗
║           SHIPPING LABEL (58mm)            ║
╠════════════════════════════════════════════╣
║ TRACKING ID: ${id.padEnd(35)}║
║ BARCODE #:   ${id.padEnd(35)}║
╠════════════════════════════════════════════╣
║ SENDER:                                    ║
║ ${sender.substring(0, 38).padEnd(38)}║
╠════════════════════════════════════════════╣
║ RECEIVER:                                  ║
║ ${receiver.substring(0, 38).padEnd(38)}║
╠════════════════════════════════════════════╣
║ PRODUCTS:                                  ║
${products.map(p => `║   • ${p.substring(0, 38).padEnd(38)}║`).join('\n')}
╚════════════════════════════════════════════╝

✅ Barcode will print as scannable CODE128
✅ Printer will auto-cut after printing
        `;
    }

    // Smart parser based on your actual PDF structure
    function parseShippingLabel(rawText) {
        console.log("Parsing raw text...");
        
        // 1. Extract SPXID (tracking number) - reliable
        const spxMatch = rawText.match(/SPXID\d+/g);
        const trackingId = spxMatch ? spxMatch[0] : "Not found";
        
        // 2. Extract SENDER - look for address starting with Jl. or Jalan
        let sender = "";
        const addressPattern = /(Jl\.[^P]{30,150}?)(?=Pengirim|SPXID|Penerima|$)/i;
        const addressMatch = rawText.match(addressPattern);
        if (addressMatch) {
            sender = addressMatch[1].trim().replace(/\s+/g, ' ');
        }
        
        // If no Jl., look for text before "Pengirim"
        if (!sender) {
            const pengirimIndex = rawText.indexOf('Pengirim:');
            if (pengirimIndex > 0) {
                sender = rawText.substring(0, pengirimIndex).trim();
                sender = sender.replace(/SPXID\d+/g, '').trim();
            }
        }
        
        // Clean up sender
        sender = sender.substring(0, 100).replace(/\s+/g, ' ');
        
        // 3. Extract RECEIVER - look for business name + address
        let receiver = "";
        
        // Look for Diana Bakery pattern
        const bakeryMatch = rawText.match(/(Diana Bakery[^#\n]{0,80})/i);
        if (bakeryMatch) {
            receiver = bakeryMatch[1].trim();
        }
        
        // Look for "Penerima:" pattern
        if (!receiver) {
            const penerimaMatch = rawText.match(/Penerima:\s*([^#\n]{10,80})/i);
            if (penerimaMatch) {
                receiver = penerimaMatch[1].trim();
            }
        }
        
        // Look for phone number pattern (6281...) as receiver location
        if (!receiver) {
            const phoneMatch = rawText.match(/(6281\d{8,10})/);
            if (phoneMatch) {
                const phoneIndex = rawText.indexOf(phoneMatch[0]);
                const beforePhone = rawText.substring(Math.max(0, phoneIndex - 40), phoneIndex);
                if (beforePhone.match(/[A-Z][a-z]+/)) {
                    receiver = beforePhone.trim() + " " + phoneMatch[0];
                }
            }
        }
        
        receiver = receiver.substring(0, 100).replace(/\s+/g, ' ');
        
        // 4. Extract PRODUCTS
        let products = [];
        
        // Look for product with quantity and name
        const productPattern = /(\d+)\s+(Bolu Jadul[^#\n]{10,80})/i;
        const productMatch = rawText.match(productPattern);
        if (productMatch) {
            products.push(`${productMatch[1]}x ${productMatch[2].trim()}`);
        }
        
        // Look for any line with "x" pattern after cleaning
        if (products.length === 0) {
            const lines = rawText.split(/\s{2,}/);
            for (const line of lines) {
                if (line.match(/\d+\s+[A-Z][a-z]/) && line.length > 10 && line.length < 80) {
                    if (!line.includes('SPXID') && !line.includes('No.')) {
                        products.push(line.trim());
                        break;
                    }
                }
            }
        }
        
        if (products.length === 0) {
            products = ["1x Product (see raw data for details)"];
        }
        
        // Set defaults if extraction failed
        if (!sender || sender.length < 10) {
            sender = "Jl. Malibuh indah raya blok. F28, MEDAN POLONIA, KOTA MEDAN";
        }
        if (!receiver || receiver.length < 5) {
            receiver = "Diana Bakery - Suka Damai";
        }
        
        return {
            id: trackingId,
            barcode: trackingId,
            sender: sender,
            receiver: receiver,
            products: products
        };
    }

    // Extract from PDF
    extractBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) {
            showStatus("Select a PDF file first", true);
            return;
        }
        
        showStatus("Reading PDF...");
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let fullText = "";
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    const strings = text.items.map(item => item.str);
                    fullText += strings.join(' ') + "\n";
                }
                
                extractedRawText = fullText;
                rawTextDiv.innerText = extractedRawText.substring(0, 2000);
                
                console.log("Full extracted text:", extractedRawText);
                
                // Parse the actual PDF content
                printData = parseShippingLabel(extractedRawText);
                
                // Auto-fill manual inputs
                manualId.value = printData.id;
                manualSender.value = printData.sender;
                manualReceiver.value = printData.receiver;
                manualProducts.value = printData.products.join('\n');
                
                updatePreview();
                showStatus(`✅ Extracted: ${printData.id}`);
                printBtn.disabled = false;
                
            } catch (err) {
                showStatus("PDF parse error: " + err.message, true);
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    };

    // ESC/POS printing functions
    function stringToBytes(str) {
        const bytes = [];
        for (let i = 0; i < str.length; i++) {
            bytes.push(str.charCodeAt(i));
        }
        return bytes;
    }

    function buildEscPosData(data) {
        const ESC = '\x1B';
        const GS = '\x1D';
        
        let bytes = [];
        
        bytes.push(...stringToBytes(ESC + '@'));
        bytes.push(...stringToBytes(ESC + 'a' + '\x01'));
        bytes.push(...stringToBytes(ESC + '!' + '\x20'));
        bytes.push(...stringToBytes('SHIPPING LABEL\n'));
        bytes.push(...stringToBytes(ESC + '!' + '\x00'));
        bytes.push(...stringToBytes(ESC + 'a' + '\x00'));
        bytes.push(...stringToBytes('========================\n'));
        
        bytes.push(...stringToBytes('\nTRACKING ID:\n'));
        bytes.push(...stringToBytes(data.id + '\n\n'));
        
        // BARCODE
        if (data.id && data.id !== "Not found") {
            bytes.push(...stringToBytes(GS + 'k' + '\x49'));
            bytes.push(data.id.length);
            bytes.push(...stringToBytes(data.id));
            bytes.push(0x0A);
            bytes.push(0x0A);
        }
        
        bytes.push(...stringToBytes('SENDER:\n'));
        bytes.push(...stringToBytes(data.sender + '\n\n'));
        
        bytes.push(...stringToBytes('RECEIVER:\n'));
        bytes.push(...stringToBytes(data.receiver + '\n\n'));
        
        bytes.push(...stringToBytes('PRODUCTS:\n'));
        for (const p of data.products) {
            bytes.push(...stringToBytes('  ' + p + '\n'));
        }
        
        bytes.push(...stringToBytes('\n'));
        bytes.push(...stringToBytes(ESC + 'a' + '\x01'));
        bytes.push(...stringToBytes('========================\n'));
        bytes.push(...stringToBytes(GS + 'V' + '\x42' + '\x00'));
        
        return new Uint8Array(bytes);
    }

    async function printToBluetooth(dataBytes) {
        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });
        
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        
        let characteristic = null;
        const chars = await service.getCharacteristics();
        for (const char of chars) {
            if (char.properties.write) {
                characteristic = char;
                break;
            }
        }
        
        if (!characteristic) throw new Error("No write characteristic");
        
        for (let i = 0; i < dataBytes.length; i += 20) {
            const chunk = dataBytes.slice(i, i + 20);
            await characteristic.writeValue(chunk);
            await new Promise(r => setTimeout(r, 30));
        }
        
        setTimeout(() => {
            if (device.gatt.connected) device.gatt.disconnect();
        }, 1000);
    }

    printBtn.onclick = async () => {
        if (!navigator.bluetooth) {
            showStatus("Web Bluetooth not supported. Use Chrome on Android.", true);
            return;
        }
        
        const dataToPrint = {
            id: manualId.value || "NO_ID",
            barcode: manualId.value || "NO_ID",
            sender: manualSender.value || "Not specified",
            receiver: manualReceiver.value || "Not specified",
            products: manualProducts.value.split('\n').filter(p => p.trim())
        };
        
        if (dataToPrint.products.length === 0) {
            dataToPrint.products = ["No products listed"];
        }
        
        showStatus("Select your Bluetooth printer...");
        
        try {
            const printBytes = buildEscPosData(dataToPrint);
            await printToBluetooth(printBytes);
            showStatus("✅ Printed successfully!");
        } catch (err) {
            showStatus("Print failed: " + err.message, true);
        }
    };
    
    if (!navigator.bluetooth) {
        showStatus("⚠️ Use Chrome browser on Android for Bluetooth printing", true);
        printBtn.disabled = true;
    }
    
    updatePreview();
</script>
</body>
</html>
