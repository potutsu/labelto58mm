<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Bakery — Image Branding Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f9f4ee;
    --warm-white: #fdfaf6;
    --red: #c0392b;
    --dark: #1a1614;
    --mid: #6b5c52;
    --border: #e8ddd4;
  }

  body {
    background: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--red);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  header p {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 8px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--red);
    margin: 16px auto 0;
    opacity: 0.4;
  }

  .tool-wrapper {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Drop Zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    background: var(--warm-white);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--red);
    background: #fdf8f5;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 16px;
    opacity: 0.3;
  }

  .drop-zone h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--dark);
    margin-bottom: 6px;
  }

  .drop-zone p {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
  }

  /* Controls */
  .controls {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    display: none;
    flex-direction: column;
    gap: 20px;
  }

  .controls.visible { display: flex; }

  .control-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    min-width: 100px;
  }

  .position-grid {
    display: grid;
    grid-template-columns: repeat(3, 36px);
    grid-template-rows: repeat(3, 36px);
    gap: 4px;
  }

  .pos-btn {
    border: 1px solid var(--border);
    background: var(--cream);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pos-btn:hover { border-color: var(--red); background: #fdf5f3; }
  .pos-btn.active { background: var(--red); border-color: var(--red); }

  .pos-btn svg { width: 10px; height: 10px; }
  .pos-btn.active svg rect { fill: white; }
  .pos-btn svg rect { fill: var(--mid); }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    flex: 1;
    min-width: 120px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
  }

  .range-val {
    font-size: 0.7rem;
    color: var(--mid);
    min-width: 36px;
    text-align: right;
  }

  /* Preview */
  .preview-wrap {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .preview-wrap.visible { display: flex; }

  .preview-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
  }

  .preview-box {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #111;
    position: relative;
  }

  canvas#preview {
    display: block;
    width: 100%;
    height: auto;
    max-height: 520px;
    object-fit: contain;
  }

  /* Actions */
  .actions {
    display: none;
    gap: 12px;
  }

  .actions.visible { display: flex; }

  .btn {
    flex: 1;
    padding: 14px 24px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--red);
    color: white;
  }

  .btn-primary:hover { background: #a93226; }

  .btn-secondary {
    background: transparent;
    color: var(--mid);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--mid); color: var(--dark); }

  /* Backing mode buttons */
  .mode-btns {
    display: flex;
    gap: 8px;
  }

  .mode-btn {
    padding: 8px 18px;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--cream);
    border-radius: 3px;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.15s;
  }

  .mode-btn:hover { border-color: var(--red); color: var(--red); }
  .mode-btn.active { background: var(--red); border-color: var(--red); color: white; }



  footer {
    margin-top: 48px;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>Diana Bakery</h1>
  <p>Image Branding Tool</p>
  <div class="divider"></div>
</header>

<div class="tool-wrapper">

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="imageInput" accept="image/*">
    <svg class="drop-icon" viewBox="0 0 40 40" fill="none">
      <rect x="4" y="8" width="32" height="24" rx="2" stroke="#6b5c52" stroke-width="1.5"/>
      <circle cx="14" cy="17" r="3" stroke="#6b5c52" stroke-width="1.5"/>
      <path d="M4 28l9-8 6 6 5-4 12 10" stroke="#6b5c52" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <h2>Drop your photo here</h2>
    <p>or tap to select from gallery</p>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls">

    <!-- Position -->
    <div class="control-row">
      <span class="control-label">Position</span>
      <div class="position-grid" id="posGrid">
        <button class="pos-btn" data-pos="top-left"><svg viewBox="0 0 12 12"><rect x="1" y="1" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="top-center"><svg viewBox="0 0 12 12"><rect x="4" y="1" width="4" height="4"/></svg></button>
        <button class="pos-btn active" data-pos="top-right"><svg viewBox="0 0 12 12"><rect x="7" y="1" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="mid-left"><svg viewBox="0 0 12 12"><rect x="1" y="4" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="center"><svg viewBox="0 0 12 12"><rect x="4" y="4" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="mid-right"><svg viewBox="0 0 12 12"><rect x="7" y="4" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="bottom-left"><svg viewBox="0 0 12 12"><rect x="1" y="7" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="bottom-center"><svg viewBox="0 0 12 12"><rect x="4" y="7" width="4" height="4"/></svg></button>
        <button class="pos-btn" data-pos="bottom-right"><svg viewBox="0 0 12 12"><rect x="7" y="7" width="4" height="4"/></svg></button>
      </div>
    </div>

    <!-- Size -->
    <div class="control-row">
      <span class="control-label">Logo Size</span>
      <input type="range" id="sizeRange" min="8" max="40" value="22">
      <span class="range-val" id="sizeVal">22%</span>
    </div>

    <!-- Opacity -->
    <div class="control-row">
      <span class="control-label">Opacity</span>
      <input type="range" id="opacityRange" min="20" max="100" value="90">
      <span class="range-val" id="opacityVal">90%</span>
    </div>

    <!-- Background mode -->
    <div class="control-row">
      <span class="control-label">Background</span>
      <div class="mode-btns">
        <button class="mode-btn active" id="modeDark" data-mode="dark">Dark</button>
        <button class="mode-btn" id="modeLight" data-mode="light">Light</button>
      </div>
    </div>

  </div>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap">
    <span class="preview-label">Preview</span>
    <div class="preview-box">
      <canvas id="preview"></canvas>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions" id="actions">
    <button class="btn btn-secondary" id="resetBtn">Reset</button>
    <button class="btn btn-primary" id="downloadBtn">Download</button>
  </div>

</div>

<footer>Diana Bakery Branding Tool</footer>

<!-- Hidden canvas for full-res export -->
<canvas id="exportCanvas" style="display:none"></canvas>

// ── Elements ───────────────────────────────────────────────────────────────
const dropZone    = document.getElementById('dropZone');
const imageInput  = document.getElementById('imageInput');
const controls    = document.getElementById('controls');
const previewWrap = document.getElementById('previewWrap');
const actions     = document.getElementById('actions');
const previewCanvas = document.getElementById('preview');
const exportCanvas  = document.getElementById('exportCanvas');
const ctx         = previewCanvas.getContext('2d');
const exportCtx   = exportCanvas.getContext('2d');
const sizeRange   = document.getElementById('sizeRange');
const sizeVal     = document.getElementById('sizeVal');
const opacityRange= document.getElementById('opacityRange');
const opacityVal  = document.getElementById('opacityVal');

// ── Drag & Drop ────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadProductImage(file);
});

imageInput.addEventListener('change', e => {
  if (e.target.files[0]) loadProductImage(e.target.files[0]);
});

// ── Load Product Image ─────────────────────────────────────────────────────
function loadProductImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      state.productImg = img;
      showUI();
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Show UI ────────────────────────────────────────────────────────────────
function showUI() {
  controls.classList.add('visible');
  previewWrap.classList.add('visible');
  actions.classList.add('visible');
}

// ── Position Grid ──────────────────────────────────────────────────────────
document.getElementById('posGrid').addEventListener('click', e => {
  const btn = e.target.closest('.pos-btn');
  if (!btn) return;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.position = btn.dataset.pos;
  render();
});

// ── Sliders ────────────────────────────────────────────────────────────────
sizeRange.addEventListener('input', () => {
  state.size = +sizeRange.value;
  sizeVal.textContent = state.size + '%';
  render();
});

opacityRange.addEventListener('input', () => {
  state.opacity = +opacityRange.value;
  opacityVal.textContent = state.opacity + '%';
  render();
});

// ── Backing Mode ───────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.bgMode = btn.dataset.mode;
    render();
  });
});

// ── Remove White Background from Logo ─────────────────────────────────────
function getLogoCanvas(img) {
  const c = document.createElement('canvas');
  c.width = img.width;
  c.height = img.height;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const imageData = cx.getImageData(0, 0, c.width, c.height);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) data[i+3] = 0;
  }
  cx.putImageData(imageData, 0, 0);
  return c;
}

// ── Compute logo position ──────────────────────────────────────────────────
function getLogoXY(position, canvasW, canvasH, logoW, logoH) {
  const pad = canvasW * 0.04;
  const positions = {
    'top-left':      [pad, pad],
    'top-center':    [(canvasW - logoW) / 2, pad],
    'top-right':     [canvasW - logoW - pad, pad],
    'mid-left':      [pad, (canvasH - logoH) / 2],
    'center':        [(canvasW - logoW) / 2, (canvasH - logoH) / 2],
    'mid-right':     [canvasW - logoW - pad, (canvasH - logoH) / 2],
    'bottom-left':   [pad, canvasH - logoH - pad],
    'bottom-center': [(canvasW - logoW) / 2, canvasH - logoH - pad],
    'bottom-right':  [canvasW - logoW - pad, canvasH - logoH - pad],
  };
  return positions[position] || positions['top-right'];
}

// ── Draw Logo With Backing ─────────────────────────────────────────────────
function drawLogo(c, lx, ly, logoW, logoH) {
  const isDark = state.bgMode === 'dark';
  c.save();
  c.globalAlpha = state.opacity / 100;

  if (!isDark) {
    // Light background — white pill backing
    const pad = logoW * 0.08;
    const r = logoH * 0.18;
    const bx = lx - pad, by = ly - pad;
    const bw = logoW + pad * 2, bh = logoH + pad * 2;
    c.globalAlpha = 0.75;
    c.fillStyle = '#ffffff';
    c.beginPath();
    c.moveTo(bx + r, by);
    c.lineTo(bx + bw - r, by);
    c.quadraticCurveTo(bx + bw, by, bx + bw, by + r);
    c.lineTo(bx + bw, by + bh - r);
    c.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh);
    c.lineTo(bx + r, by + bh);
    c.quadraticCurveTo(bx, by + bh, bx, by + bh - r);
    c.lineTo(bx, by + r);
    c.quadraticCurveTo(bx, by, bx + r, by);
    c.closePath();
    c.fill();
    c.globalAlpha = state.opacity / 100;
  } else {
    // Dark background — drop shadow only
    c.shadowColor = 'rgba(0,0,0,0.5)';
    c.shadowBlur = logoH * 0.1;
    c.shadowOffsetX = 1;
    c.shadowOffsetY = 2;
  }

  if (logoReady) {
    const logoCanvas = getLogoCanvas(logoImg);
    c.drawImage(logoCanvas, lx, ly, logoW, logoH);
  } else {
    // Text fallback
    c.shadowColor = isDark ? 'rgba(0,0,0,0.5)' : 'transparent';
    c.font = `italic ${logoH * 0.5}px 'Cormorant Garamond', Georgia, serif`;
    c.fillStyle = '#c0392b';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('Diana Bakery', lx + logoW / 2, ly + logoH / 2);
  }
  c.restore();
}

// ── Main Render ────────────────────────────────────────────────────────────
function render(targetCanvas, targetCtx) {
  if (!state.productImg) return;

  const canvas = targetCanvas || previewCanvas;
  const c = targetCtx || ctx;

  const maxW = targetCanvas ? state.productImg.width : Math.min(state.productImg.width, 900);
  const scale = maxW / state.productImg.width;
  canvas.width  = state.productImg.width  * scale;
  canvas.height = state.productImg.height * scale;

  c.drawImage(state.productImg, 0, 0, canvas.width, canvas.height);

  const logoW = canvas.width * (state.size / 100);
  const aspectRatio = logoReady ? (logoImg.height / logoImg.width) : 0.35;
  const logoH = logoW * aspectRatio;
  const [lx, ly] = getLogoXY(state.position, canvas.width, canvas.height, logoW, logoH);

  drawLogo(c, lx, ly, logoW, logoH);
}

// ── Download ───────────────────────────────────────────────────────────────
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!state.productImg) return;

  // Render at full resolution
  exportCanvas.width  = state.productImg.width;
  exportCanvas.height = state.productImg.height;
  render(exportCanvas, exportCtx);

  const link = document.createElement('a');
  link.download = 'diana-bakery-branded.png';
  link.href = exportCanvas.toDataURL('image/png', 1.0);
  link.click();
});

// ── Reset ──────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  state.productImg = null;
  state.bgMode = 'dark';
  controls.classList.remove('visible');
  previewWrap.classList.remove('visible');
  actions.classList.remove('visible');
  imageInput.value = '';
  sizeRange.value = 22; sizeVal.textContent = '22%';
  opacityRange.value = 90; opacityVal.textContent = '90%';
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-pos="top-right"]').classList.add('active');
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('modeDark').classList.add('active');
  state.position = 'top-right';
  state.size = 22;
  state.opacity = 90;
});
</script>
</body>
</html>
