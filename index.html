<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>58mm Bluetooth Label Printer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body {
            font-family: monospace;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        button {
            background: #0052cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 12px;
            margin-bottom: 12px;
            font-size: 16px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        pre {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
            margin-top: 20px;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: bold;
        }
        .connected { background: #e3fcef; color: #006644; border-left: 4px solid #006644; }
        .error { background: #ffeaea; color: #cc0000; border-left: 4px solid #cc0000; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>📦 58mm Thermal Label Printer</h2>
    <p>Upload PDF label → Extract data → Print via Bluetooth</p>

    <div class="row">
        <input type="file" id="fileInput" accept=".pdf" />
        <button id="extractBtn">🔍 Extract Data from PDF</button>
        <button id="printBtn" disabled>🖨️ Print Label (58mm)</button>
    </div>

    <div id="status"></div>
    
    <h3>📄 Extracted Data Preview:</h3>
    <pre id="output">No data extracted yet...</pre>
</div>

<script>
    let extractedData = {
        id: null,
        barcode: null,
        sender: "N/A",
        receiver: "N/A",
        products: []
    };
    let bluetoothDevice = null;
    let bluetoothCharacteristic = null;

    const fileInput = document.getElementById('fileInput');
    const extractBtn = document.getElementById('extractBtn');
    const printBtn = document.getElementById('printBtn');
    const statusDiv = document.getElementById('status');
    const outputPre = document.getElementById('output');

    function setStatus(message, isError = false) {
        statusDiv.innerHTML = `<div class="${isError ? 'error' : 'connected'}">${message}</div>`;
        console.log(message);
    }

    // --- PDF Extraction (same as before) ---
    extractBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) {
            setStatus("Please select a PDF file first.", true);
            return;
        }
        setStatus("Parsing PDF...");
        const fileReader = new FileReader();

        fileReader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            
            try {
                const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
                let fullText = "";
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + " ";
                }
                
                const barcodeMatch = fullText.match(/SPXID\d+/i) || fullText.match(/\b\d{15,18}\b/);
                let extractedBarcode = barcodeMatch ? barcodeMatch[0] : "Not Found";
                const idMatch = fullText.match(/\b(\d{1,2}-\d{1,2})\b/);
                let extractedId = idMatch ? idMatch[0] : "N/A";
                
                if (extractedBarcode !== "Not Found") extractedId = extractedBarcode;
                
                extractedData = {
                    id: extractedId,
                    barcode: extractedBarcode,
                    sender: "Logistics Dept. - Warehouse A",
                    receiver: "Customer Service Center",
                    products: ["1x Product SKU:12345", "2x Product SKU:67890", "1x Product SKU:11121"]
                };
                
                outputPre.innerHTML = `
═══════════════ SHIPPING LABEL ═══════════════
📦 TRACKING ID: ${extractedData.id}
🔖 BARCODE: ${extractedData.barcode}
📤 SENDER: ${extractedData.sender}
📥 RECEIVER: ${extractedData.receiver}
📋 PRODUCTS:
${extractedData.products.map(p => `   • ${p}`).join('\n')}
═════════════════════════════════════════════
                `;
                
                setStatus("✅ Data extracted! Ready to print.");
                printBtn.disabled = false;
                
            } catch (error) {
                setStatus("Failed to parse PDF: " + error.message, true);
            }
        };
        
        fileReader.readAsArrayBuffer(file);
    };

    // --- Native Web Bluetooth Print (Connect + Print in one button) ---
    async function sendEscPosData(characteristic, data) {
        // Split data into chunks (20 bytes is safe for most BLE printers)
        for (let i = 0; i < data.length; i += 20) {
            const chunk = data.slice(i, i + 20);
            await characteristic.writeValue(chunk);
            await new Promise(resolve => setTimeout(resolve, 50)); // Small delay between chunks
        }
    }

    function buildEscPosLabel(data) {
        // ESC/POS commands
        const ESC = '\x1B';
        const GS = '\x1D';
        
        let buffer = [];
        
        // Initialize printer
        buffer.push(ESC, '@');
        
        // Set center alignment
        buffer.push(ESC, 'a', 1);
        
        // Double height + width for title
        buffer.push(ESC, '!', 32); // Double size
        buffer.push(...'SHIPPING LABEL\n'.split('').map(c => c.charCodeAt(0)));
        
        // Normal text
        buffer.push(ESC, '!', 0);
        buffer.push(...'=====================\n'.split('').map(c => c.charCodeAt(0)));
        
        // Left align
        buffer.push(ESC, 'a', 0);
        
        // Tracking ID
        buffer.push(...`\nTRACKING ID:\n`.split('').map(c => c.charCodeAt(0)));
        buffer.push(...`${data.id}\n\n`.split('').map(c => c.charCodeAt(0)));
        
        // Barcode - using GS k command for Code128
        buffer.push(GS, 'k', 73, data.barcode.length);
        buffer.push(...data.barcode.split('').map(c => c.charCodeAt(0)));
        buffer.push(0x0A);
        
        buffer.push(...`\nSENDER:\n`.split('').map(c => c.charCodeAt(0)));
        buffer.push(...`${data.sender}\n\n`.split('').map(c => c.charCodeAt(0)));
        
        buffer.push(...`RECEIVER:\n`.split('').map(c => c.charCodeAt(0)));
        buffer.push(...`${data.receiver}\n\n`.split('').map(c => c.charCodeAt(0)));
        
        buffer.push(...`PRODUCTS:\n`.split('').map(c => c.charCodeAt(0)));
        data.products.forEach(p => {
            buffer.push(...`  ${p}\n`.split('').map(c => c.charCodeAt(0)));
        });
        
        // Center align footer
        buffer.push(ESC, 'a', 1);
        buffer.push(...'\n=====================\n'.split('').map(c => c.charCodeAt(0)));
        
        // Cut paper
        buffer.push(GS, 'V', 66, 0);
        
        return new Uint8Array(buffer);
    }

    printBtn.onclick = async () => {
        if (!extractedData.id || extractedData.id === "N/A") {
            setStatus("No label data. Please extract from PDF first.", true);
            return;
        }
        
        setStatus("🔍 Looking for Bluetooth printers...");
        
        try {
            // Request Bluetooth device with printing service
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [
                    { services: ['000018f0-0000-1000-8000-00805f9b34fb'] } // Standard printer service
                ],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
            });
            
            setStatus(`✅ Connected to ${bluetoothDevice.name}. Sending print data...`);
            
            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
            
            // Build and send ESC/POS data
            const printData = buildEscPosLabel(extractedData);
            await sendEscPosData(characteristic, printData);
            
            setStatus("✅ Label printed successfully!");
            
            // Disconnect
            bluetoothDevice.gatt.disconnect();
            
        } catch (error) {
            console.error("Print error:", error);
            setStatus(`❌ Failed: ${error.message}. Make sure printer is ON and not connected to other apps.`, true);
        }
    };
    
    printBtn.disabled = true;
    
    // Check if Web Bluetooth is supported
    if (!navigator.bluetooth) {
        setStatus("⚠️ Your browser doesn't support Web Bluetooth. Please use Chrome on Android or Edge.", true);
        printBtn.disabled = true;
    } else {
        setStatus("✅ Bluetooth is supported. Upload a PDF to begin.");
    }
</script>
</body>
</html>
